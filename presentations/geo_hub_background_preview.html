<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ethiopia Geo Hub Background Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f6f0df;
      --muted: rgba(246, 240, 223, 0.72);
      --accent: #45d2d8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Aptos, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      background: #061014;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: clamp(28px, 7vw, 108px);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(6, 16, 20, 0.92) 0%, rgba(6, 16, 20, 0.58) 44%, rgba(6, 16, 20, 0.18) 100%),
        linear-gradient(0deg, rgba(6, 16, 20, 0.96) 0%, rgba(6, 16, 20, 0.1) 42%, rgba(6, 16, 20, 0.54) 100%),
        url("../outputs/geo_hub_background/ethiopia_flood_topography_background.png") center / cover no-repeat;
      z-index: -2;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 96px 96px;
      mask-image: linear-gradient(90deg, black, transparent 72%);
      z-index: -1;
    }

    .content {
      max-width: 820px;
    }

    .eyebrow {
      margin-bottom: 18px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(52px, 8vw, 112px);
      line-height: 0.94;
      letter-spacing: 0;
      font-weight: 850;
    }

    p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 27px);
      line-height: 1.24;
      font-weight: 520;
    }
  </style>
</head>
<body>
  <main class="hero">
    <section class="content" aria-label="Ethiopia Geospatial Data Hub">
      <div class="eyebrow">Ethiopia Geospatial Data Hub</div>
      <h1>Spatial data for decisions at terrain scale.</h1>
      <p>Flood exposure and highland relief rendered from the hub's own source layers.</p>
    </section>
  </main>
</body>
</html>
